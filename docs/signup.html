<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BotalSePaisa - Sign Up</title>
    <link rel="stylesheet" href="styles/app.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <style>
        .auth-container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-height: 100vh;
            padding: 30px;
            padding-bottom: 20px;
        }
        .logo-section {
            text-align: center;
            margin-bottom: 30px;
        }
        .logo-section img {
            height: 35px;
            margin-bottom: 8px;
        }
        .logo-section h1 {
            color: var(--accent-primary);
            font-size: 1.4rem;
            margin-bottom: 5px;
        }
        .logo-section p {
            color: var(--text-muted);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .auth-tabs {
            display: flex;
            background: var(--bg-input);
            border-radius: var(--border-radius-sm);
            padding: 4px;
            margin-bottom: 25px;
        }
        .auth-tab {
            flex: 1;
            text-align: center;
            padding: 12px;
            color: var(--text-muted);
            font-weight: 600;
            font-size: 0.9rem;
            text-decoration: none;
            border-radius: var(--border-radius-sm);
            transition: all 0.3s;
        }
        .auth-tab.active {
            background: var(--accent-gradient);
            color: white;
            box-shadow: 0 4px 15px rgba(255, 138, 0, 0.3);
        }

        .input-group { position: relative; margin-bottom: 12px; }
        .input-icon {
            position: absolute;
            left: 16px;
            top: 40px;
            color: var(--text-muted);
            font-size: 1.2rem;
        }
        .input-field {
            padding-left: 45px;
            padding-top: 12px;
            padding-bottom: 12px;
        }
        
        .checkbox-group {
            display: flex;
            align-items: flex-start;
            margin-top: 15px;
            margin-bottom: 20px;
            gap: 10px;
        }
        .checkbox-group input {
            margin-top: 4px;
            accent-color: var(--accent-primary);
        }
        .checkbox-group label {
            font-size: 0.75rem;
            color: var(--text-muted);
            line-height: 1.4;
            text-transform: none;
            font-weight: normal;
        }
        .checkbox-group a {
            color: var(--accent-primary);
            text-decoration: none;
        }
        
        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 20px 0;
            color: var(--text-muted);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .divider:not(:empty)::before { margin-right: .5em; }
        .divider:not(:empty)::after { margin-left: .5em; }

        .social-login {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 25px;
        }
        .social-btn {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: transparent;
            border: 1px solid rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .social-btn:hover {
            color: white;
            border-color: rgba(255,255,255,0.3);
        }
        
        .signin-link {
            text-align: center;
            color: var(--text-muted);
            font-size: 0.85rem;
            margin-bottom: 15px;
        }
        .signin-link a {
            color: var(--accent-primary);
            font-weight: 600;
            text-decoration: none;
        }
        .guest-link {
            text-align: center;
            color: var(--text-muted);
            font-size: 0.8rem;
            text-decoration: none;
            display: block;
            margin-bottom: 30px;
        }
        
        .footer-text {
            text-align: center;
            color: rgba(255,255,255,0.3);
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: auto;
        }

        .error-msg {
            color: var(--danger);
            background: rgba(255, 61, 113, 0.1);
            padding: 10px;
            border-radius: 8px;
            font-size: 0.85rem;
            text-align: center;
            margin-bottom: 15px;
            display: none;
        }
    </style>
</head>
<body style="padding-bottom: 0;">

<div class="auth-container">
    <div class="logo-section">
        <h1><i class='bx bx-recycle' style="color:var(--accent-primary)"></i> BotalSePaisa</h1>
        <p>Turn Waste into Wealth</p>
    </div>

    <div class="auth-tabs">
        <a href="login.html" class="auth-tab">Sign In</a>
        <a href="signup.html" class="auth-tab active">Sign Up</a>
    </div>

    <div style="margin-bottom: 20px;">
        <h2 style="font-size: 1.2rem; margin-bottom: 4px;">Hello, Friend!</h2>
        <p class="text-muted" style="font-size: 0.85rem;">Create your account to start earning rewards.</p>
    </div>

    <div id="error-message" class="error-msg"></div>

    <form id="signup-form">
        <div class="input-group">
            <label>Full Name</label>
            <i class='bx bx-user input-icon'></i>
            <input type="text" id="name" class="input-field" placeholder="John Doe" required>
        </div>

        <div class="input-group">
            <label>Email</label>
            <i class='bx bx-envelope input-icon'></i>
            <input type="email" id="email" class="input-field" placeholder="john@example.com" required>
        </div>
        
        <div class="input-group">
            <label>Password</label>
            <i class='bx bx-lock-alt input-icon'></i>
            <input type="password" id="password" class="input-field" placeholder="••••••••" required>
        </div>

        <div class="input-group">
            <label>Confirm Password</label>
            <i class='bx bx-check-shield input-icon'></i>
            <input type="password" id="confirmPassword" class="input-field" placeholder="••••••••" required>
        </div>

        <div class="checkbox-group">
            <input type="checkbox" id="terms" required>
            <label for="terms">I agree to the <a href="#">Terms & Conditions</a> and <a href="#">Privacy Policy</a></label>
        </div>

        <button type="submit" class="btn-primary" id="signup-btn">SIGN UP</button>
    </form>

    <div class="divider">OR CONNECT WITH</div>

    <div class="social-login">
        <button class="social-btn"><i class='bx bxl-google'></i></button>
        <button class="social-btn"><i class='bx bxl-apple'></i></button>
        <button class="social-btn"><span style="font-size: 0.8rem; font-weight: bold; font-family: sans-serif;">iOS</span></button>
    </div>

    <div class="signin-link">
        Already have an account? <a href="login.html">Sign In</a>
    </div>
    
    <a href="qr.html" class="guest-link">Continue as Guest</a>

    <div class="footer-text">
        © 2025 BotalSePaisa — Transforming waste into wealth
    </div>
</div>

<script src="js/signup.js"></script>
</body>
</html>
