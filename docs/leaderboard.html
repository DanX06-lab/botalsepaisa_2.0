<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BotalSePaisa - Leaderboard</title>
    <link rel="stylesheet" href="styles/app.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <style>
        .top-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
        }
        .top-header .brand-logo {
            font-size: 1.25rem;
            color: var(--accent-primary);
        }
        .back-btn {
            border: 1px solid var(--accent-primary);
            color: var(--accent-primary);
            border-radius: 20px;
            padding: 6px 16px;
            font-size: 0.75rem;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .page-title {
            font-size: 1.8rem;
            color: white;
            line-height: 1.2;
            margin-bottom: 20px;
        }

        /* Time Filters */
        .time-filters {
            display: flex;
            gap: 10px;
            margin-bottom: 16px;
        }
        .t-filter {
            background: var(--bg-card);
            border-radius: 20px;
            padding: 8px 20px;
            font-size: 0.75rem;
            color: var(--text-muted);
            cursor: pointer;
            border: none;
        }
        .t-filter.active {
            background: var(--accent-primary);
            color: var(--bg-dark);
            font-weight: 700;
        }

        /* Scope Filters */
        .scope-filters {
            display: flex;
            gap: 10px;
            margin-bottom: 40px;
        }
        .s-filter {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 6px 16px;
            font-size: 0.75rem;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .s-filter.active {
            background: rgba(255,138,0,0.1);
            border-color: var(--accent-primary);
            color: var(--accent-primary);
        }

        /* Podium Layout */
        .podium-container {
            display: flex;
            align-items: flex-end;
            justify-content: center;
            gap: 15px;
            margin-bottom: 50px;
            min-height: 180px;
        }
        .podium-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }
        .avatar-wrap {
            position: relative;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .avatar-img {
            border-radius: 50%;
            object-fit: cover;
        }
        .rank-badge {
            position: absolute;
            bottom: -5px;
            right: -5px;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            font-weight: 800;
            color: var(--bg-dark);
            border: 2px solid var(--bg-dark);
        }
        
        .podium-1 .avatar-wrap {
            width: 90px;
            height: 90px;
            border: 3px solid #FFD700;
            box-shadow: 0 0 20px rgba(255,215,0,0.3);
            margin-bottom: 12px;
        }
        .podium-1 .avatar-img { width: 84px; height: 84px; }
        .podium-1 .rank-badge { background: #FFD700; width: 28px; height: 28px; font-size: 0.85rem; }
        .podium-1 .crown { position: absolute; top: -20px; font-size: 1.5rem; color: #FFD700; }
        
        .podium-2 .avatar-wrap {
            width: 70px;
            height: 70px;
            border: 3px solid #C0C0C0;
            margin-bottom: 8px;
        }
        .podium-2 .avatar-img { width: 64px; height: 64px; }
        .podium-2 .rank-badge { background: #C0C0C0; }

        .podium-3 .avatar-wrap {
            width: 70px;
            height: 70px;
            border: 3px solid #CD7F32;
            margin-bottom: 8px;
        }
        .podium-3 .avatar-img { width: 64px; height: 64px; }
        .podium-3 .rank-badge { background: #CD7F32; }

        .p-name { font-size: 0.85rem; font-weight: 700; margin-bottom: 2px; text-align: center; }
        .p-pts { font-size: 0.75rem; color: var(--accent-primary); font-weight: 700; }
        .podium-1 .p-name { font-size: 1rem; }

        /* List Layout */
        .leaderboard-list {
            background: var(--bg-card);
            border-radius: var(--border-radius-md);
            padding: 10px 0;
            margin-bottom: 100px; /* Space for sticky rank */
        }
        .l-item {
            display: flex;
            align-items: center;
            padding: 16px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .l-item:last-child { border-bottom: none; }
        .l-rank {
            width: 30px;
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text-muted);
        }
        .l-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            margin-right: 15px;
            background: var(--bg-input);
        }
        .l-info { flex: 1; }
        .l-name { font-size: 0.95rem; font-weight: 600; margin-bottom: 4px; }
        .l-desc { font-size: 0.7rem; color: var(--text-muted); }
        .l-stats { text-align: right; }
        .l-val { font-size: 0.95rem; font-weight: 700; color: var(--accent-secondary); margin-bottom: 4px; }
        .l-label { font-size: 0.6rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }

        /* Sticky Your Rank Banner */
        .your-rank-banner {
            position: fixed;
            bottom: 80px; /* Above nav bar */
            left: 0;
            width: 100%;
            padding: 0 20px;
            z-index: 100;
        }
        @media (min-width: 481px) {
            .your-rank-banner {
                left: 50%;
                transform: translateX(-50%);
                width: 480px;
            }
        }
        .yr-card {
            background: linear-gradient(90deg, #1A2235 0%, #151A2E 100%);
            border: 1px solid rgba(255,138,0,0.3);
            border-radius: var(--border-radius-md);
            padding: 16px 20px;
            display: flex;
            align-items: center;
            box-shadow: 0 -10px 20px rgba(11, 16, 30, 0.8);
        }
        .yr-rank {
            font-size: 1.25rem;
            font-weight: 800;
            color: white;
            width: 40px;
        }
        .yr-badge {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--accent-primary);
            color: var(--bg-dark);
            font-weight: 800;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 15px;
        }
    </style>
</head>
<body>

    <header class="top-header">
        <div class="brand-logo">BotalSePaisa</div>
        <a href="user.html" class="back-btn"><i class='bx bx-left-arrow-alt'></i> Dashboard</a>
    </header>

    <div class="container" style="padding-top: 0;">
        <h1 class="page-title">Leaderboard - Top<br>Recyclers</h1>

        <div class="time-filters">
            <button class="t-filter active">Weekly</button>
            <button class="t-filter">Monthly</button>
            <button class="t-filter">All-time</button>
        </div>

        <div class="scope-filters">
            <button class="s-filter"><i class='bx bx-world'></i> Global</button>
            <button class="s-filter active"><i class='bx bx-map'></i> Local</button>
        </div>

        <div class="podium-container" id="podium-container">
            <!-- Populated by JS -->
            <div style="color: var(--text-muted); text-align: center; width: 100%;">Loading Top 3...</div>
        </div>

        <div class="leaderboard-list" id="leaderboard-list">
            <!-- Populated by JS -->
            <div style="color: var(--text-muted); text-align: center; padding: 20px;">Loading ranks...</div>
        </div>
    </div>

    <!-- Sticky Your Rank -->
    <div class="your-rank-banner">
        <div class="yr-card">
            <div class="yr-rank" id="my-rank-num">-</div>
            <div class="yr-badge">YOU</div>
            <div class="l-info">
                <div class="l-name">Your Rank</div>
                <div class="l-desc">Keep recycling to climb up!</div>
            </div>
            <div class="l-stats">
                <div class="l-val" id="my-earned">&#8377;0</div>
                <div class="l-label">EARNED</div>
            </div>
        </div>
    </div>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
        <a href="user.html" class="nav-item">
            <i class='bx bx-grid-alt'></i>
            <span>DASHBOARD</span>
        </a>
        <a href="qr.html" class="nav-item">
            <i class='bx bx-qr-scan'></i>
            <span>SCAN</span>
        </a>
        <a href="return.html" class="nav-item">
            <i class='bx bx-history'></i>
            <span>HISTORY</span>
        </a>
        <a href="leaderboard.html" class="nav-item active">
            <i class='bx bx-bar-chart-alt-2'></i>
            <span>RANKINGS</span>
        </a>
        <a href="profile.html" class="nav-item">
            <i class='bx bx-user'></i>
            <span>PROFILE</span>
        </a>
    </nav>
    <style>
        .nav-item.active i { color: var(--accent-primary); text-shadow: 0 0 10px rgba(255, 138, 0, 0.5); }
    </style>

    <script src="js/leaderboard.js"></script>
</body>
</html>
