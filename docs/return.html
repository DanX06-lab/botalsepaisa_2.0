<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BotalSePaisa - Return History</title>
    <link rel="stylesheet" href="styles/app.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <style>
        .top-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
        }
        .top-header .brand-logo {
            font-size: 1.25rem;
            color: var(--accent-primary);
        }
        .back-btn {
            color: var(--accent-primary);
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        
        .page-title {
            font-size: 1.5rem;
            color: var(--accent-primary);
            margin-bottom: 4px;
        }
        .page-subtitle {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 24px;
        }
        
        /* Pill Filters */
        .pill-filters {
            display: flex;
            gap: 10px;
            margin-bottom: 24px;
            overflow-x: auto;
            padding-bottom: 4px;
        }
        .pill {
            padding: 8px 16px;
            border-radius: 20px;
            background: var(--bg-input);
            color: var(--text-muted);
            font-size: 0.8rem;
            font-weight: 600;
            white-space: nowrap;
            border: 1px solid rgba(255,255,255,0.05);
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
        }
        .pill.active {
            background: var(--accent-gradient);
            color: white;
            border-color: transparent;
        }
        .pill-count {
            background: rgba(255,255,255,0.2);
            padding: 2px 6px;
            border-radius: 10px;
            font-size: 0.7rem;
        }
        .pill.active .pill-count { background: rgba(0,0,0,0.2); }
        .pill.pending .pill-count { color: var(--warning); background: rgba(255,170,0,0.1); }
        
        /* Filter Controls */
        .filter-controls {
            display: grid;
            gap: 16px;
            margin-bottom: 24px;
        }
        .filter-group label {
            display: block;
            font-size: 0.65rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
            font-weight: 600;
        }
        .filter-select {
            width: 100%;
            background: var(--bg-input);
            border: 1px solid rgba(255,255,255,0.05);
            color: var(--text-main);
            padding: 12px 16px;
            border-radius: var(--border-radius-sm);
            font-family: 'Inter', sans-serif;
            appearance: none;
            background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%23FF8A00%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E");
            background-repeat: no-repeat;
            background-position: right 16px top 50%;
            background-size: 10px auto;
        }
        .filter-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        /* Transactions List */
        .list-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        .list-title {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 700;
        }
        
        .transaction-card {
            background: var(--bg-card);
            border-radius: var(--border-radius-md);
            padding: 16px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 16px;
            border: 1px solid rgba(255,255,255,0.02);
        }
        .tx-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            background: rgba(255,138,0,0.1);
            color: var(--accent-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            flex-shrink: 0;
        }
        .tx-details { flex: 1; }
        .tx-id {
            font-weight: 700;
            font-size: 0.9rem;
            margin-bottom: 4px;
        }
        .tx-meta {
            font-size: 0.7rem;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .tx-right {
            text-align: right;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 8px;
        }
        .tx-amount {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--accent-secondary);
        }
        .tx-amount.rejected { color: var(--text-muted); text-decoration: line-through; }

        .view-more {
            text-align: center;
            color: var(--accent-primary);
            font-size: 0.85rem;
            font-weight: 600;
            margin: 20px 0 40px;
            cursor: pointer;
        }

        /* Sticky Footer Summary */
        .summary-footer {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 20px;
        }
        .summary-box {
            background: linear-gradient(145deg, #1A2235 0%, #151A2E 100%);
            border-radius: var(--border-radius-md);
            padding: 16px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .summary-title {
            font-size: 0.65rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
            font-weight: 600;
        }
        .summary-val {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--accent-primary);
            margin-bottom: 4px;
        }
        .summary-trend {
            font-size: 0.65rem;
            color: var(--success);
            display: flex;
            align-items: center;
            gap: 2px;
        }
    </style>
</head>
<body>

    <header class="top-header">
        <div class="brand-logo">BotalSePaisa</div>
        <a href="user.html" class="back-btn"><i class='bx bx-left-arrow-alt'></i> Back</a>
    </header>

    <div class="container">
        <div class="card" style="border:none; padding:0; background:transparent; box-shadow:none;">
            <h1 class="page-title">Return History</h1>
            <p class="page-subtitle">Track your ecological impact and earnings</p>

            <div class="pill-filters">
                <div class="pill active">All</div>
                <div class="pill">Completed <span class="pill-count" id="count-completed">0</span></div>
                <div class="pill pending">Pending <span class="pill-count" id="count-pending" style="color:var(--warning);">0</span></div>
            </div>

            <div class="filter-controls">
                <div class="filter-group">
                    <label>DATE RANGE</label>
                    <input type="date" class="filter-select" id="date-filter">
                </div>
                <div class="filter-group">
                    <label>STATUS</label>
                    <select class="filter-select" id="status-filter">
                        <option value="all">All Transactions</option>
                        <option value="completed">Completed</option>
                        <option value="pending">Pending</option>
                        <option value="rejected">Rejected</option>
                    </select>
                </div>
                <div class="filter-buttons">
                    <button class="btn-primary" style="padding:12px; font-size:0.85rem;" id="refresh-btn">
                        <i class='bx bx-refresh'></i> Refresh Data
                    </button>
                    <button class="btn-secondary" id="clear-btn">Clear Filters</button>
                </div>
            </div>

            <div class="list-header">
                <div class="list-title">RECENT TRANSACTIONS</div>
                <div class="list-title" style="text-transform: none; font-weight: 600;" id="showing-text">Showing 0 records</div>
            </div>

            <div id="transactions-list">
                <!-- Transactions will be loaded here via JS -->
                <div style="text-align: center; padding: 20px; color: var(--text-muted); font-size: 0.9rem;">
                    Loading transactions...
                </div>
            </div>

            <div class="view-more" id="view-more-btn">View More History</div>

            <!-- Summary Footer -->
            <div class="summary-footer">
                <div class="summary-box">
                    <div class="summary-title">TOTAL BOTTLES</div>
                    <div class="summary-val" id="summary-bottles">0</div>
                    <div class="summary-trend"><i class='bx bx-trending-up'></i> +0% this month</div>
                </div>
                <div class="summary-box">
                    <div class="summary-title">PAISA EARNED</div>
                    <div class="summary-val" id="summary-earned">&#8377;0</div>
                    <div class="summary-trend"><i class='bx bx-trending-up'></i> +&#8377;0 this month</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
        <a href="user.html" class="nav-item">
            <i class='bx bx-grid-alt'></i>
            <span>DASHBOARD</span>
        </a>
        <a href="qr.html" class="nav-item">
            <i class='bx bx-qr-scan'></i>
            <span>SCAN</span>
        </a>
        <a href="return.html" class="nav-item active">
            <i class='bx bx-history'></i>
            <span>HISTORY</span>
        </a>
        <a href="leaderboard.html" class="nav-item">
            <i class='bx bx-bar-chart-alt-2'></i>
            <span>RANKINGS</span>
        </a>
        <a href="profile.html" class="nav-item">
            <i class='bx bx-user'></i>
            <span>PROFILE</span>
        </a>
    </nav>
    <style>
        .nav-item.active i { color: var(--accent-primary); text-shadow: 0 0 10px rgba(255, 138, 0, 0.5); }
    </style>

    <script src="js/return_history.js"></script>
</body>
</html>
