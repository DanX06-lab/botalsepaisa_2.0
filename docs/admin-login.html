<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | BotalSePaisa</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --panel-bg: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-primary: #3b82f6;
            --accent-hover: #2563eb;
            --success: #10b981;
            --error: #ef4444;
            --border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #0f172a 100%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Animated background */
        body::before {
            content: '';
            position: fixed;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: radial-gradient(circle at 30% 40%, rgba(59, 130, 246, 0.06) 0%, transparent 50%),
                        radial-gradient(circle at 70% 60%, rgba(167, 139, 250, 0.06) 0%, transparent 50%);
            animation: bgPulse 8s ease-in-out infinite alternate;
            z-index: 0;
        }

        @keyframes bgPulse {
            0% { transform: scale(1) rotate(0deg); }
            100% { transform: scale(1.1) rotate(3deg); }
        }

        .login-container {
            position: relative;
            z-index: 1;
            width: 90%;
            max-width: 420px;
        }

        .admin-badge {
            text-align: center;
            margin-bottom: 2rem;
        }

        .admin-badge .shield {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.2), rgba(167, 139, 250, 0.2));
            border: 2px solid rgba(59, 130, 246, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1rem;
            font-size: 2.5rem;
            animation: shieldFloat 3s ease-in-out infinite;
        }

        @keyframes shieldFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        .admin-badge h1 {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(to right, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.25rem;
        }

        .admin-badge p {
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .login-card {
            background: var(--panel-bg);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .form-group input {
            width: 100%;
            padding: 0.8rem 1rem;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-main);
            font-size: 1rem;
            font-family: 'Inter', sans-serif;
            transition: all 0.2s;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
        }

        .form-group input::placeholder {
            color: rgba(148, 163, 184, 0.5);
        }

        .login-btn {
            width: 100%;
            padding: 0.85rem;
            background: linear-gradient(135deg, var(--accent-primary), #7c3aed);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 0.5rem;
        }

        .login-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 20px rgba(59, 130, 246, 0.3);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .login-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .message {
            padding: 0.75rem 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            font-size: 0.9rem;
            text-align: center;
            display: none;
        }

        .message.error {
            display: block;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid var(--error);
            color: #fca5a5;
        }

        .message.success {
            display: block;
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid var(--success);
            color: var(--success);
        }

        .message.info {
            display: block;
            background: rgba(59, 130, 246, 0.1);
            border: 1px solid var(--accent-primary);
            color: #93c5fd;
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 1.5rem;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.85rem;
            transition: color 0.2s;
        }

        .back-link:hover {
            color: var(--text-main);
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="admin-badge">
            <div class="shield">🛡️</div>
            <h1>Admin Portal</h1>
            <p>BotalSePaisa Hub Management</p>
        </div>

        <div class="login-card">
            <div id="login-message" class="message"></div>

            <form id="admin-login-form">
                <div class="form-group">
                    <label for="admin-email">Admin Email</label>
                    <input type="email" id="admin-email" name="email" placeholder="admin@botalsepaisa.com" required>
                </div>

                <div class="form-group">
                    <label for="admin-password">Password</label>
                    <input type="password" id="admin-password" name="password" placeholder="Enter your password" required>
                </div>

                <button type="submit" class="login-btn" id="login-btn">Sign In to Admin Panel</button>
            </form>
        </div>

        <a href="login.html" class="back-link">← Back to User Login</a>
    </div>

    <script>
        const hostname = window.location.hostname;
        const API_BASE = (hostname === "localhost" || hostname === "127.0.0.1" || hostname.includes("ngrok"))
            ? window.location.origin
            : "https://botalsepaisa-2-0.onrender.com";

        const form = document.getElementById('admin-login-form');
        const msgEl = document.getElementById('login-message');
        const btn = document.getElementById('login-btn');

        function showMsg(text, type) {
            msgEl.textContent = text;
            msgEl.className = `message ${type}`;
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('admin-email').value.trim().toLowerCase();
            const password = document.getElementById('admin-password').value;

            if (!email || !password) {
                showMsg('Please fill in all fields.', 'error');
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Signing in...';
            showMsg('Authenticating...', 'info');

            try {
                const res = await fetch(`${API_BASE}/api/users/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'ngrok-skip-browser-warning': 'true'
                    },
                    body: JSON.stringify({ email, password })
                });

                const data = await res.json();

                if (!res.ok) {
                    throw new Error(data.message || 'Login failed');
                }

                if (!data.token) {
                    throw new Error('No token received');
                }

                // Check if the user is an admin
                if (!data.user || !data.user.isAdmin) {
                    showMsg('Access denied. This account does not have admin privileges.', 'error');
                    btn.disabled = false;
                    btn.textContent = 'Sign In to Admin Panel';
                    return;
                }

                // Store token and redirect to admin dashboard
                localStorage.setItem('token', data.token);
                localStorage.setItem('userName', data.user.name);
                localStorage.setItem('isAdmin', 'true');

                showMsg('Welcome back, Admin! Redirecting...', 'success');

                setTimeout(() => {
                    window.location.href = 'admin-dashboard.html';
                }, 1000);

            } catch (error) {
                showMsg(error.message || 'Failed to connect to server.', 'error');
                btn.disabled = false;
                btn.textContent = 'Sign In to Admin Panel';
            }
        });

        // If already logged in as admin, redirect
        const existingToken = localStorage.getItem('token');
        if (existingToken && localStorage.getItem('isAdmin') === 'true') {
            window.location.href = 'admin-dashboard.html';
        }
    </script>
</body>
</html>
